<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>TechWave</title>
</head>

<body class="font-[inter]">
    <header class="bg-[#1A0B2E] text-[#FFFFFF]">

        <nav class="felx items-center justify-between p-3 md:px-30 py-8 flex  ">
            <div class="logo">
                <h1 class="font-bold text-2xl md:text-4xl ">Tech<span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-pink-500 to-purple-700">Wave</span>
                </h1>
            </div>
            <div class="nav-menu hidden sm:block">
                <ul class="flex gap-6">
                    <li><a href="" class="hover:text-[#914beb] font-semibold">About</a></li>
                    <li><a href="" class="hover:text-[#914beb] font-semibold">Episodes</a></li>
                    <li><a href="" class="hover:text-[#914beb] font-semibold">Host</a></li>
                </ul>
            </div>
            <div
                class="bg-gradient-to-r from-yellow-300 via-pink-500 to-purple-700 rounded-full px-6 py-3 btn hidden sm:block">
                <button><span class="font-semibold ">Subscribe</span> <a href=""><i
                            class="fa-solid fa-arrow-right"></i></a></button>
            </div>
            <div class="sm:hidden">
                <img src="./assets/hamburger-menu.png" alt="">
            </div>

        </nav>

        <!-- banner -->
        <section class="w-full  bg-[url(./assets/hero-bg.png)] bg-cover bg-center py-10  md:py-[100px] ">
            <div class="flex justify-center">
               <div class="relative">
                    <img class="w-[200px] h-[200px] md:w-[350px] md:h-[350px]" src="./assets/hero-circle.png" alt="">
                    <div class="absolute bg-[#00FF88] text-[#1A0B2E] px-4 py-2 rounded-2xl top-2.5 right-[-25px] md:top-4 md:right-4">
                        <p class="text-[18px] font-semibold uppercase">new</p>
                    </div>
                    <div class="absolute top-[55px] right-[75px] md:top-[70px] md:right-[110px] microphone" >
                        <img class="w-12 h-22 md:w-[120px] md:h-[200px]" src="./assets/microphone.png" alt="">
                    </div>
                </div>  
            </div>
            <div class="text-center mt-6 pt-6">
                <h3 class="text-3xl font-extrabold  md:text-6xl">Welcome to TechWave</h3>
                <p class=" text-[10px] md:text-xl">Your daily dose of tech insights, productivity hacks, and personal growth</p>
            </div>
            <div class="flex justify-center gap-4 mt-6 px-8 md:px-1 ">
                <div class="bg-gradient-to-r from-yellow-300 via-pink-500 to-purple-700 px-3 py-2 md:px-5 md:py-3 rounded-full gap-4 flex items-center  ">
                    <img class="w-5 h-5" src="./assets/spotify.png" alt="">
                    <h4>Listen on Spotify </h4>
                </div>
                <div class="flex justify-center items-center px-3 py-2 md:px-5 md:py-3 rounded-full gap-2  border border-[#00FF88] sub_btn">
                    <img class="w-5 h-4" src="./assets/message.png" alt="">
                    <h4 class="text-[#00FF88] font-semibold">Subscription</h4>
                </div>
            </div>


        </section>

    </header>
</body>

</html>
